# ===== MySQL DataSource =====
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/taskmanagement?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# ===== JPA / Hibernate =====
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== App =====
spring.application.name=task-management

# ===== JWT =====
jwt.secret=${JWT_SECRET:mySuperSecretKeyMySuperSecretKey12345}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ===== Mail (Gmail SMTP) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
